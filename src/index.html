<body>
  <app-root>
    <!--
    This whole content will be replaced thus no need to worry about polluting or misplacing DOM elements
  -->
    <div class="qs-app-boot-screen" aria-hidden="true"></div>
    <!-- Up to here -->
  </app-root>
  <noscript>Please enable JavaScript</noscript>
  <script>
    const theme = localStorage.getItem('appTheme');
    const followsSystem = !theme || theme === 'System';
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const shouldUseDarkTheme = theme === 'Dark' || (followsSystem && prefersDark);
    document.body.classList.toggle('dark-theme', shouldUseDarkTheme);
  </script>
</body>
