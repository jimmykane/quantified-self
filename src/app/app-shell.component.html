@if (authState !== null) {
<!-- Circular Reveal Theme Overlay -->
@if (themeOverlayActive) {
<div class="theme-reveal-overlay" [ngClass]="themeOverlayClass">
</div>
}
@if (showInitialLoader) {
<div class="qs-loader-overlay" aria-hidden="true">
  <app-metric-loader></app-metric-loader>
</div>
}

<div [class.has-banner]="hasBanner" class="app-layout-wrapper"
  [style.--qs-layout-top-offset]="layoutTopOffsetPx + 'px'"
  [style.--qs-effective-top-offset]="effectiveTopOffsetPx + 'px'"
  [style.--qs-banner-height]="(showNavigation() ? bannerHeight : 0) + 'px'">
  <app-grace-period-banner (heightChanged)="onBannerHeightChanged($event)"></app-grace-period-banner>

  <app-route-loader></app-route-loader>

  <!-- Maintenance & Replacement Logic -->
  @if (maintenanceMode() && !isHomeRoute && !isOnboardingRoute) {
  <app-impersonation-banner></app-impersonation-banner>
  <app-maintenance [message]="maintenanceMessage()"></app-maintenance>
  } @else {
  <!-- New Header Layout -->
  @if (showNavigation()) {
  <app-shell-header [bannerHeight]="bannerHeight" [class.app-shell-header--hidden]="headerHidden"
    [authState]="authState" [isDashboardRoute]="isDashboardRoute" [isLoginRoute]="isLoginRoute"
    [isAdminRoute]="isAdminRoute" [isHandset]="isHandset()"
    [showUploadActivities]="showUploadActivities()" [isAdminUser]="isAdminUser"
    [unreadWhatsNewCount]="unreadWhatsNewCount"
    (toggleSidenav)="toggleSidenav()" (logoClick)="onLogoClick()"
    (whatsNewClick)="openWhatsNew()" (dashboardClick)="navigateToDashboard()"
    (adminClick)="navigateToAdmin()" (loginClick)="navigateToLogin()">
  </app-shell-header>
  }

  <mat-sidenav-container class="app-sidenav-container" [style.margin-top.px]="layoutTopOffsetPx">
    @if (showNavigation()) {
    <mat-sidenav #sidenav [mode]="'over'" [fixedInViewport]="true" [fixedTopGap]="layoutTopOffsetPx"
      [autoFocus]="false">
      <app-sidenav></app-sidenav>
    </mat-sidenav>
    }

    <mat-sidenav-content>
      <app-impersonation-banner></app-impersonation-banner>
      <div class="router-outlet-container" [@routeAnimations]="routeAnimationState()">
        @if (maintenanceLoading()) {
        <div class="loading-overlay">
          <div class="logo-spinner">
            <mat-icon svgIcon="logo"></mat-icon>
          </div>
        </div>
        }

        <router-outlet #outlet="outlet"></router-outlet>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
  }
</div>
} @else {
<app-metric-loader></app-metric-loader>
}
