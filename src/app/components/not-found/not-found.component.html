<main class="not-found-page">
  <section class="not-found-content" aria-labelledby="not-found-title">
    <p class="eyebrow">404</p>
    <h1 id="not-found-title">Page not found</h1>
    <p class="not-found-copy">
      The page may have moved, or the address may be wrong.
    </p>

    <div class="action-row" aria-label="Not found actions">
      <a mat-flat-button class="qs-mat-primary" routerLink="/">
        Go Home
        <mat-icon iconPositionEnd>home</mat-icon>
      </a>
      <a mat-stroked-button routerLink="/integrations">
        Explore Integrations
        <mat-icon iconPositionEnd>hub</mat-icon>
      </a>
    </div>
  </section>
</main>
