<app-loading-overlay
  [isLoading]="isLoading || !apiLoaded()"
  [hasError]="noMapData"
  [errorMessage]="'No map data yet'"
  [errorHint]="'Pan/zoom wider or load more activities to see markers'"
  [errorIcon]="'map'"
  [showSkeleton]="false"
  height="100%"
  minHeight="100%">

  @if (selectedEvent; as popupEvent) {
  @if (getSelectedEventPopupContent(popupEvent); as popupContent) {
  <div class="events-map-popup-anchor">
    <app-map-activity-popup
      [activityType]="popupContent.eventType"
      [iconActivityType]="popupContent.iconEventType"
      [startDate]="popupContent.startDate"
      [fallbackTopMetaText]="'Activity start'"
      [metrics]="popupContent.metrics"
      [event]="popupEvent"
      [user]="user"
      [actionLabel]="'Open activity'"
      [dismissible]="true"
      [forceMobileLayout]="true"
      (dismiss)="clearSelectedEvent()"
      (actionClick)="openSelectedEvent()">
    </app-map-activity-popup>
  </div>
  }
  }

  <section class="mapbox-stage">
    <div #mapDiv class="mapbox-map"></div>
  </section>
</app-loading-overlay>
