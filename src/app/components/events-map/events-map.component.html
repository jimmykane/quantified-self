<app-loading-overlay
  [isLoading]="isLoading || !apiLoaded()"
  [hasError]="mapLoadFailed"
  [errorMessage]="'Map unavailable'"
  [errorHint]="'Could not load the map. Try again later.'"
  [errorIcon]="'map'"
  [showSkeleton]="false"
  height="100%"
  minHeight="100%">

  @if (selectedEvent; as popupEvent) {
  @if (selectedEventPopupContent; as popupContent) {
  <div class="events-map-popup-anchor">
    <app-map-activity-popup
      [activityType]="popupContent.eventType"
      [iconActivityType]="popupContent.iconEventType"
      [startDate]="popupContent.startDate"
      [fallbackTopMetaText]="'Activity start'"
      [metrics]="popupContent.metrics"
      [event]="popupEvent"
      [user]="user"
      [actionLabel]="'Open activity'"
      [dismissible]="true"
      [forceMobileLayout]="true"
      (dismiss)="clearSelectedEvent()"
      (actionClick)="openSelectedEvent()">
    </app-map-activity-popup>
  </div>
  }
  }

  <section class="mapbox-stage">
    <div #mapDiv class="mapbox-map"></div>
    @if (showMapEmptyState) {
    <div class="events-map-empty-state" role="status" aria-live="polite">
      <div class="events-map-empty-state__panel">
        <mat-icon aria-hidden="true">map</mat-icon>
        <div class="events-map-empty-state__title">{{ mapEmptyStateTitle }}</div>
        <div class="events-map-empty-state__hint">{{ mapEmptyStateHint }}</div>
      </div>
    </div>
    }
  </section>
</app-loading-overlay>
