<div class="workspace-navigation">
  <div
    class="workspace-navigation__mobile-shell"
    [class.workspace-navigation__mobile-shell--backward]="canScrollMobileBackward"
    [class.workspace-navigation__mobile-shell--forward]="canScrollMobileForward">
    @if (canScrollMobileBackward) {
    <button
      mat-icon-button
      type="button"
      class="workspace-navigation__scroll-control workspace-navigation__scroll-control--previous"
      aria-label="Show previous sections"
      (click)="scrollMobileNavigation(-1)">
      <mat-icon>chevron_left</mat-icon>
    </button>
    }
    <nav
      #mobileNavigation
      class="workspace-navigation__mobile-tabs"
      role="tablist"
      [attr.aria-label]="navigationAriaLabel"
      (scroll)="updateMobileNavigationScrollState()">
      @for (section of sections; track section.id) {
      <a
        #mobileSectionTab
        href=""
        mat-button
        class="workspace-navigation__mobile-tab"
        role="tab"
        [class.workspace-navigation__mobile-tab--active]="activeSection === section.id"
        [attr.aria-selected]="activeSection === section.id"
        (click)="selectSection($event, section.id)">
        <span
          class="workspace-navigation__tab-label settings-tab-label">
          @if (section.svgIcon) {
          <mat-icon [svgIcon]="section.svgIcon"></mat-icon>
          } @else {
          <mat-icon>{{ section.icon }}</mat-icon>
          }
          <span>{{ section.label }}</span>
        </span>
      </a>
      }
    </nav>
    @if (canScrollMobileForward) {
    <button
      mat-icon-button
      type="button"
      class="workspace-navigation__scroll-control workspace-navigation__scroll-control--next"
      aria-label="Show more sections"
      (click)="scrollMobileNavigation(1)">
      <mat-icon>chevron_right</mat-icon>
    </button>
    }
  </div>

  <div
    role="tabpanel"
    [attr.aria-label]="navigationAriaLabel + ' content'"
    class="workspace-navigation__panel settings-tab-panel">
    <section class="workspace-main">
      <ng-content></ng-content>
    </section>
  </div>
</div>
