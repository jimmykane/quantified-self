<h2 mat-dialog-title>{{ title }}</h2>

<mat-dialog-content class="event-tags-dialog-content qs-scrollbar">
  <mat-form-field appearance="outline" class="tags-field" subscriptSizing="dynamic">
    <mat-label>Tags</mat-label>
    <mat-chip-grid #tagGrid [attr.aria-label]="title">
      @for (tag of stagedTags(); track tag) {
      <mat-chip-row [disabled]="isSaving()" (removed)="removeTag(tag)">
        <span class="tag-chip-label">{{ tag }}</span>
        <button matChipRemove type="button" class="tag-remove-button" [disabled]="isSaving()"
          [attr.aria-label]="'Remove ' + tag">
          <mat-icon class="tag-remove-icon">close</mat-icon>
        </button>
      </mat-chip-row>
      }
      <input #tagInputElement class="tag-input" matInput placeholder="Add tag"
        [attr.maxlength]="tagMaxLength"
        [disabled]="isSaving() || hasReachedLimit()" [matChipInputFor]="tagGrid"
        [matChipInputSeparatorKeyCodes]="separatorKeysCodes" [matChipInputAddOnBlur]="true"
        [matAutocomplete]="tagAutocomplete" (input)="updateTagInput($any($event.target).value)"
        (matChipInputTokenEnd)="addTagFromInput($event)">
    </mat-chip-grid>
    <mat-autocomplete #tagAutocomplete="matAutocomplete" (optionSelected)="selectSuggestion($event)">
      @for (suggestion of filteredSuggestions(); track suggestion) {
      <mat-option [value]="suggestion">{{ suggestion }}</mat-option>
      }
    </mat-autocomplete>
  </mat-form-field>

  <div class="tag-dialog-footer">
    <span>{{ stagedTags().length }} / {{ tagLimit }}</span>
    <span>{{ tagMaxLength }} characters per tag</span>
    @if (hasReachedLimit()) { <span>Tag limit reached</span> }
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" [mat-dialog-close]="null" [disabled]="isSaving()">Cancel</button>
  <button mat-flat-button class="qs-mat-primary" type="button" [disabled]="isSaving() || !hasChanges()" (click)="apply()">
    <span class="dialog-action-content">
      @if (isSaving()) { <mat-progress-spinner diameter="18" mode="indeterminate"></mat-progress-spinner> }
      <span>Apply</span>
    </span>
  </button>
</mat-dialog-actions>
