<section class="component-container">
  <app-loading-overlay [isLoading]="!isInitialized" [showSkeleton]="false" height="auto">
    <div class="dashboard-content">
      @if (user) {
      <app-event-search [isLoading]="isLoading" [selectedDateRange]="user.settings.dashboardSettings.dateRange"
        [selectedStartDate]="searchStartDate" [selectedEndDate]="searchEndDate" [startOfTheWeek]="startOfTheWeek"
        [selectedActivityTypes]="user.settings.dashboardSettings.activityTypes"
        [showMergedEventsToggle]="hasMergedEvents"
        [includeMergedEvents]="user.settings.dashboardSettings.includeMergedEvents !== false"
        (searchChange)="search($event)">
      </app-event-search>
      }

      <!-- Removed mat-divider in favor of CSS spacing/gap -->

      @if (user) {
      @defer (on idle) {
      <app-summaries [isLoading]="isLoading" [user]="user" [showActions]="!targetUser || targetUser.uid === user.uid"
        [dashboardDateRange]="user.settings.dashboardSettings.dateRange"
        [dashboardStartDate]="searchStartDate"
        [dashboardEndDate]="searchEndDate"
        [events]="events">
      </app-summaries>
      } @placeholder {
      <div style="min-height: 120px;"></div>
      }
      }

      @if (user) {
      <app-event-table [targetUser]="targetUser" [isLoading]="isLoading" [user]="user"
        [showActions]="!targetUser || targetUser.uid === user.uid" [events]="events"></app-event-table>
      }
    </div>
  </app-loading-overlay>
</section>
