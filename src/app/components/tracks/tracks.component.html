<mat-card class="mat-elevation-z0">
  @if (user) {
  <app-peek-panel class="tracks-search-peek" position="top" topAnchor="center" [defaultExpanded]="true"
    [expandedSizePx]="360" [collapsedSizePx]="36" ariaLabelExpand="Expand filters" ariaLabelCollapse="Collapse filters">
    <app-event-search [startOfTheWeek]="user.settings.unitSettings.startOfTheWeek" [showDatePicker]="false"
      [showActivityTypePicker]="false" [dateRangesToShow]="dateRangesToShow"
      [selectedActivityTypes]="user.settings.myTracksSettings?.activityTypes"
      [selectedDateRange]="user.settings.myTracksSettings?.dateRange" [includeMergedEvents]="false"
      (searchChange)="search($event)">
    </app-event-search>
  </app-peek-panel>
  }

  <div #mapDiv id="map"></div>
  <div class="map-style-controls">
    <mat-button-toggle-group appearance="legacy" name="mapStyle" aria-label="Map Style" [disabled]="isLoading()"
      [value]="user?.settings?.myTracksSettings?.mapStyle || 'default'" (change)="setMapStyle($any($event).value)">
      <mat-button-toggle value="default">Default</mat-button-toggle>
      <mat-button-toggle value="satellite">Satellite</mat-button-toggle>
      <mat-button-toggle value="outdoors">Outdoors</mat-button-toggle>
    </mat-button-toggle-group>
    @if (isLoading()) {
    <mat-spinner diameter="24"></mat-spinner>
    }
  </div>

  @if (hasEvaluatedTripDetection()) {
  <app-peek-panel class="tracks-trips-peek" position="left" [expanded]="detectedTripsPanelExpanded()"
    (expandedChange)="detectedTripsPanelExpanded.set($event)" [expandedSizePx]="340" [collapsedSizePx]="44"
    ariaLabelExpand="Expand detected trips" ariaLabelCollapse="Collapse detected trips">
    <div peek-header>
      <div class="detected-trips-summary-row">
        <span class="detected-trips-title">Detected trips</span>
        <span class="detected-trips-badge">{{ detectedTrips().length }}</span>
      </div>
    </div>
    @if (detectedTrips().length === 0) {
    <p class="detected-trips-empty">No trips detected for this period</p>
    } @else {
    <ul class="detected-trips-list qs-scrollbar">
      @for (trip of detectedTrips(); track trip.tripId) {
      <li>
        <button type="button" class="detected-trip-button" (click)="onDetectedTripSelected(trip)">
          <span class="trip-location">{{ trip.locationLabel || 'Trip' }}</span>
          <span class="trip-dates">{{ trip.startDate | date:'mediumDate' }} - {{ trip.endDate | date:'mediumDate' }}</span>
          <span class="trip-count">{{ trip.activityCount }} activities</span>
        </button>
      </li>
      }
    </ul>
    }
  </app-peek-panel>
  }
</mat-card>
