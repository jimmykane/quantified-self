<section class="ai-loading-state" [class.ai-loading-state--compact]="compact()">
  <div class="ai-loading-state__header">
    <div class="ai-loading-state__lead">
      <div class="ai-loading-state__orb" aria-hidden="true">
        <mat-icon>auto_awesome</mat-icon>
      </div>
      <div class="ai-loading-state__title-group">
        <p class="mat-label-medium ai-loading-state__eyebrow">{{ eyebrow() }}</p>
        <p class="mat-title-medium ai-loading-state__title">{{ title() }}</p>
      </div>
    </div>

    <p class="mat-label-small ai-loading-state__status-label">Step {{ progressLabel() }}</p>
  </div>

  @if (copy()) {
    <p class="mat-body-medium ai-loading-state__copy">{{ copy() }}</p>
  }

  <div class="ai-loading-state__roller" [attr.aria-label]="'Progress: ' + activeStep()">
    <div class="ai-loading-state__roller-window">
      <div class="ai-loading-state__roller-track" [style.transform]="rollerTransform()">
        @for (step of resolvedSteps(); track step; let stepIndex = $index) {
          <div
            class="ai-loading-state__roller-row"
            [class.ai-loading-state__roller-row--active]="stepIndex === activeStepIndex()">
            <span class="ai-loading-state__roller-dot" aria-hidden="true"></span>
            <span class="mat-body-small">{{ step }}</span>
          </div>
        }
      </div>
    </div>
  </div>

  @if (!compact()) {
    <div class="ai-loading-state__preview" aria-hidden="true">
      <div class="ai-loading-state__preview-card">
        <span class="ai-loading-state__preview-pill"></span>
        <span class="ai-loading-state__preview-line ai-loading-state__preview-line--long"></span>
        <span class="ai-loading-state__preview-line ai-loading-state__preview-line--medium"></span>
        <span class="ai-loading-state__preview-line ai-loading-state__preview-line--short"></span>
      </div>

      <div class="ai-loading-state__preview-card ai-loading-state__preview-card--chart">
        <span class="ai-loading-state__preview-bar ai-loading-state__preview-bar--one"></span>
        <span class="ai-loading-state__preview-bar ai-loading-state__preview-bar--two"></span>
        <span class="ai-loading-state__preview-bar ai-loading-state__preview-bar--three"></span>
        <span class="ai-loading-state__preview-bar ai-loading-state__preview-bar--four"></span>
      </div>
    </div>
  }

  <mat-progress-bar class="ai-loading-state__progress" mode="indeterminate"></mat-progress-bar>
</section>
