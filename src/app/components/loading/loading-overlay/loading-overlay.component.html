<div class="loading-overlay-container" [style.height]="height" [style.minHeight]="minHeight" [style.width]="width">
    <!-- Overlay Content (Spinner/Skeleton) -->
    <div class="loading-indicators" *ngIf="isLoading && (showProgressBar || showSkeleton)">
        <div class="overlay-surface" [style.--overlay-radius]="borderRadius">
            <mat-progress-bar *ngIf="showProgressBar" [mode]="mode" class="overlay-progress-bar"></mat-progress-bar>
            <app-skeleton *ngIf="showSkeleton" width="100%" height="100%" [borderRadius]="borderRadius" class="overlay-skeleton"></app-skeleton>
        </div>
    </div>

    <!-- Optional Shade -->
    <app-shade *ngIf="showShade" [isActive]="isLoading" [hasError]="hasError"
        [allowErrorPassthrough]="allowErrorPassthrough"
        [errorMessage]="errorMessage" [hint]="errorHint" [icon]="errorIcon" [showProgressBar]="false"></app-shade>

    <!-- Transcluded Content -->
    <ng-content></ng-content>
</div>
