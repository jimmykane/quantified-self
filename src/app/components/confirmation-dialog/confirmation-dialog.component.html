<h2 mat-dialog-title>{{ title }}</h2>
<mat-dialog-content>
    <p [innerHTML]="message"></p>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button (click)="onCancel()" *ngIf="showCancel">{{ cancelButtonText }}</button>
    <button mat-flat-button [color]="confirmColor" (click)="onConfirm()">{{ confirmButtonText }}</button>
</mat-dialog-actions>
