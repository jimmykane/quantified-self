<div class="glass-card event-summary-card">
  <!-- Primary Info Section -->
  <app-summary-primary-info
    [activityType]="mainActivityType"
    [iconActivityType]="mainActivityType"
    [startDate]="event.startDate"
    [iconTooltip]="'Event is ' + event.privacy"
    [iconClickable]="true"
    [metrics]="heroSummaryMetrics"
    (iconClick)="toggleEventPrivacy()">
    <div summary-icon-badge class="privacy-mini-wrapper">
      <app-privacy-icon [privacy]="event.privacy"></app-privacy-icon>
    </div>

    <app-service-source-icon summary-top-meta-suffix [event]="event" [user]="user"></app-service-source-icon>

    @if (feelingIcon) {
    <span summary-chips class="chip feeling-chip" [matTooltip]="'Feeling: ' + feelingLabel" [attr.aria-label]="'Feeling: ' + feelingLabel">
      <mat-icon aria-hidden="true">{{ feelingIcon }}</mat-icon>
    </span>
    }
    @if (rpe) {
    <span summary-chips class="chip rpe-chip" [matTooltip]="'RPE: ' + rpeLabel">RPE {{ rpe }}</span>
    }

    <div summary-actions class="event-summary-actions">
      @if (isOwner) {
      <div class="event-summary-actions-primary">
        <button mat-icon-button (click)="openEditDetails()" matTooltip="Edit details">
          <mat-icon>edit</mat-icon>
        </button>
        @if (event.isMerge && eventActivitiesCount >= 2) {
        <button mat-icon-button (click)="openBenchmark()" matTooltip="Benchmark Analysis" class="benchmark-btn"
          [matBadge]="benchmarkCount > 1 ? benchmarkCount : null" matBadgeColor="accent" matBadgeSize="small">
          <mat-icon [class.has-result]="benchmarkCount > 0">
            analytics
          </mat-icon>
        </button>
        }
        <app-event-actions [user]="user" [event]="event" [showDownloadOriginal]="true" align="end"></app-event-actions>
      </div>
      }

      <div class="event-summary-actions-secondary">
        @if (hasDevices) {
        <button mat-icon-button class="summary-stats-action-button devices-button" (click)="openDevices()"
          matTooltip="View sensors & devices" aria-label="View sensors and devices">
          <mat-icon>sensors</mat-icon>
        </button>
        }
        <button mat-icon-button class="summary-stats-action-button show-more-button" (click)="openDetailedStats()"
          matTooltip="Show more statistics" aria-label="Show more statistics">
          <mat-icon>keyboard_double_arrow_down</mat-icon>
        </button>
      </div>
    </div>
  </app-summary-primary-info>

  <!-- Activities Toggles Section -->
  @if (eventActivitiesCount > 1) {
  <div class="summary-activities-toggles">
    <app-activities-toggles [event]="event" [user]="user" [isOwner]="isOwner" [selectedActivities]="selectedActivities">
    </app-activities-toggles>
  </div>
  }

  <!-- Stats Grid Section -->
  <div class="summary-stats-area">
    <div class="summary-stats-layout">
      <div class="stats-container">
        <app-event-card-stats-grid [event]="event" [selectedActivities]="selectedActivities"></app-event-card-stats-grid>
      </div>
    </div>

    <ng-content select="[after-stats]"></ng-content>
  </div>

  <!-- Projected Content (Tabs, etc.) -->
  <mat-divider></mat-divider>
  <ng-content select="[summary-bottom]"></ng-content>
</div>
