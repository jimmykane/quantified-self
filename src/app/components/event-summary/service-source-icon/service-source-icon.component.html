@if (showIcon && serviceLogo) {
<mat-icon
  [svgIcon]="serviceLogo"
  class="service-logo"
  [style.width.px]="iconWidth"
  [style.height.px]="iconHeight"
  [matTooltip]="serviceTooltip"
  [matTooltipDisabled]="!serviceTooltip">
</mat-icon>
}
@if (shouldShowText) {
<span class="service-source-text">{{ serviceDisplayName || serviceName }}</span>
}
