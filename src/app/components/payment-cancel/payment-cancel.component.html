<div class="container">
  <mat-card class="cancel-card">
    <mat-card-header>
      <mat-card-title>Payment Canceled</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p>You have canceled the payment process. No charges were made.</p>
    </mat-card-content>
    <mat-card-actions class="cancel-card-actions">
      <button mat-button routerLink="/dashboard">Back to Dashboard</button>
      <span class="cancel-card-actions__spacer" aria-hidden="true"></span>
      <button mat-flat-button routerLink="/subscriptions">Try Again</button>
    </mat-card-actions>
  </mat-card>
</div>
