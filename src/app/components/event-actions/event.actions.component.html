<button mat-icon-button [matMenuTriggerFor]="menu" (click)="$event.stopPropagation();" (menuOpened)="menuOpen($event)">
  <mat-icon>more_vert</mat-icon>
</button>
<mat-menu #menu="matMenu" class="qs-menu-panel">
  @if (!isPubliclyShared) {
  <button mat-menu-item (click)="shareEventLink()" [disabled]="isSharing">
    <mat-icon>share</mat-icon>
    <span>Share link</span>
  </button>
  } @else {
  <button mat-menu-item (click)="copyPublicEventLink()" [disabled]="isSharing">
    <mat-icon>link</mat-icon>
    <span>Copy public link</span>
  </button>
  <button mat-menu-item (click)="stopSharingEvent()" [disabled]="isSharing">
    <mat-icon>link_off</mat-icon>
    <span>Stop sharing</span>
  </button>
  }

  <button mat-menu-item class="regenerate-stat-item" (click)="reGenerateStatistics()" [disabled]="isReprocessing">
    <mat-icon>autorenew</mat-icon>
    <span class="menu-item-with-tooltip">Regenerate activity statistics using Sports-Lib <mat-icon class="toolTip"
        matTooltip="This will re-calculate statistics like distance, ascent, descent etc...">info</mat-icon>
    </span>
  </button>
  <div class="menu-item-tooltip-wrapper" [matTooltip]="getReimportDisabledReason()"
    [matTooltipDisabled]="canReimportFromOriginalFile()">
    <button mat-menu-item class="reimport-stat-item" (click)="reImportActivityFromFile()"
      [disabled]="isReprocessing || !canReimportFromOriginalFile()">
      <mat-icon>upload_file</mat-icon>
      <span>Reimport activity from file</span>
    </button>
  </div>
  @if (hasPositionalData()) {
  <button mat-menu-item (click)="downloadGPX()">
    <mat-icon>file_download</mat-icon>
    <span>Download as GPX</span>
  </button>
  }





  @if ((event['originalFiles'] && event['originalFiles'].length > 0) || (event['originalFile'] &&
  event['originalFile'].path)) {
  <button mat-menu-item (click)="downloadOriginals()">
    <mat-icon>cloud_download</mat-icon>
    <span>Download original(s)</span>
  </button>
  }

  <button mat-menu-item (click)="delete()">
    <mat-icon>delete</mat-icon>
    <span>Delete</span>
  </button>
</mat-menu>
