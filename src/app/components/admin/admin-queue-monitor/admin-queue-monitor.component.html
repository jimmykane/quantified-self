<div class="admin-container">
    <div class="header-container">
        <h1 class="app-text-gradient">{{ pageTitle }}</h1>
        <p class="premium-subtitle">{{ pageSubtitle }}</p>
    </div>

    <div class="navigation-actions">
        <button mat-stroked-button class="qs-mat-primary" routerLink="/admin">
            <mat-icon>dashboard</mat-icon>
            Back To Dashboard
        </button>
        <button mat-stroked-button class="qs-mat-primary" routerLink="/admin/queues/workout" [disabled]="queueView === 'workout'">
            <mat-icon>fitness_center</mat-icon>
            Workout Queue
        </button>
        <button mat-stroked-button class="qs-mat-primary" routerLink="/admin/queues/reparse" [disabled]="queueView === 'reparse'">
            <mat-icon>autorenew</mat-icon>
            Reparse Queue
        </button>
    </div>

    <app-admin-queue-stats [stats]="queueStats" [loading]="isLoadingStats" [queueView]="queueView">
    </app-admin-queue-stats>
</div>
