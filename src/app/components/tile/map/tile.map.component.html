<section>
  <app-dashboard-tile-event-filters class="tile-event-filter-controls" [eventFilters]="eventFilters"
    [canNavigateNewer]="canNavigateTileEventsNewer"
    (rangeChange)="eventFilterRangeChange.emit($event)"
    (activityTypesChange)="eventFilterActivityTypesChange.emit($event)"
    (navigate)="eventFilterNavigate.emit($event)">
  </app-dashboard-tile-event-filters>
  @if (showActions) {
  <div class="actions">
    @if (enableDesktopDrag) {
    <button mat-icon-button cdkDragHandle class="drag-handle-indicator" aria-label="Drag tile">
      <mat-icon>drag_indicator</mat-icon>
    </button>
    }
    <app-tile-map-actions [user]="user" [order]="order" [size]="size" [type]="type"
      (editInDashboardManager)="onEditInDashboardManager($event)">
    </app-tile-map-actions>
  </div>
  }
  @if (events) {
  <app-events-map [user]="user" [events]="events" [isLoading]="isLoading" [mapStyle]="mapStyle"
    [clusterMarkers]="clusterMarkers">
  </app-events-map>
  }
</section>
