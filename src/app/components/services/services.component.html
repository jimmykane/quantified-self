<div class="settings-container">
  <app-loading-overlay [isLoading]="isLoading" [showSkeleton]="false" height="auto">
    <main class="settings-content">
      <app-material-pill-tabs class="settings-nav" [selectedIndex]="selectedSectionIndex"
        (selectedIndexChange)="onSelectedSectionIndexChange($event)" [dynamicHeight]="true"
        [lazyContent]="tabsLazyContent"
        [stickyHeader]="tabsStickyHeader" [topOffset]="tabsTopOffset"
        ariaLabel="Service integrations">

        <ng-template appMaterialPillTab="Suunto">
            <mat-card class="settings-card glass-card">
              <div class="header-content">
                <div class="header-avatar">
                  <mat-icon class="layer-icon" svgIcon="suunto"></mat-icon>
                </div>
                <div class="header-info">
                  <h1>Suunto Integration</h1>
                  <p>Manage your connection with Suunto App.</p>
                </div>
              </div>
              <div class="card-content">
                <app-services-suunto [user]="user" [hasProAccess]="hasProAccess"></app-services-suunto>
              </div>
            </mat-card>
          </ng-template>

        <ng-template appMaterialPillTab="Garmin">
            <mat-card class="settings-card glass-card">
              <div class="header-content">
                <div class="header-avatar">
                  <mat-icon class="layer-icon" svgIcon="garmin"></mat-icon>
                </div>
                <div class="header-info">
                  <h1>Garmin Integration</h1>
                  <p>Manage your connection with Garmin Connect.</p>
                </div>
              </div>
              <div class="card-content">
                <app-services-garmin [user]="user" [hasProAccess]="hasProAccess"
                  [isAdmin]="isAdmin"></app-services-garmin>
              </div>
            </mat-card>
          </ng-template>

        <ng-template appMaterialPillTab="COROS">
            <mat-card class="settings-card glass-card">
              <div class="header-content">
                <div class="header-avatar">
                  <mat-icon class="layer-icon" svgIcon="coros"></mat-icon>
                </div>
                <div class="header-info">
                  <h1>COROS Integration</h1>
                  <p>Manage your connection with COROS.</p>
                </div>
              </div>
              <div class="card-content">
                <app-services-coros [user]="user" [hasProAccess]="hasProAccess"></app-services-coros>
              </div>
            </mat-card>
          </ng-template>
      </app-material-pill-tabs>
    </main>
  </app-loading-overlay>
</div>
