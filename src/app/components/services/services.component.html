<div class="settings-container">
  <app-loading-overlay [isLoading]="isLoading" [showSkeleton]="false" height="auto">
    <main class="settings-content services-content">
      <app-workspace-section-navigation
        navigationLabel="Services"
        navigationAriaLabel="Service integrations"
        [sections]="serviceSectionOptions"
        [activeSection]="activeSection"
        variant="services"
        (sectionSelected)="selectService($any($event))">
        <header class="services-page-header">
          <div>
            <p class="services-page-header__eyebrow">Services</p>
            <h1>Connections</h1>
            <p>Bring your activity data together.</p>
          </div>
          <a mat-stroked-button class="services-page-header__privacy-link" href="/policies">
            <mat-icon>policy</mat-icon>
            Data &amp; privacy
          </a>
        </header>

        <section class="services-workspace-main">
            <section
              class="service-detail"
              [hidden]="activeSection !== 'garmin'"
              aria-labelledby="service-garmin-title">
              <header class="service-detail-header">
                <mat-icon class="service-detail-logo" svgIcon="garmin"></mat-icon>
                <div>
                  <h2 id="service-garmin-title">Garmin Connect</h2>
                  <p>Manage your connection with Garmin Connect.</p>
                </div>
              </header>
              <mat-divider></mat-divider>
              <div class="service-detail-body">
                <app-services-garmin
                  [user]="user"
                  [hasProAccess]="hasProAccess"
                  [isAdmin]="isAdmin">
                </app-services-garmin>
              </div>
            </section>

            <section
              class="service-detail"
              [hidden]="activeSection !== 'coros'"
              aria-labelledby="service-coros-title">
              <header class="service-detail-header">
                <mat-icon class="service-detail-logo" svgIcon="coros"></mat-icon>
                <div>
                  <h2 id="service-coros-title">COROS</h2>
                  <p>Manage your connection with COROS.</p>
                </div>
              </header>
              <mat-divider></mat-divider>
              <div class="service-detail-body">
                <app-services-coros [user]="user" [hasProAccess]="hasProAccess"></app-services-coros>
              </div>
            </section>

            <section
              class="service-detail"
              [hidden]="activeSection !== 'suunto'"
              aria-labelledby="service-suunto-title">
              <header class="service-detail-header">
                <mat-icon class="service-detail-logo" svgIcon="suunto"></mat-icon>
                <div>
                  <h2 id="service-suunto-title">Suunto App</h2>
                  <p>Manage your connection with Suunto App.</p>
                </div>
              </header>
              <mat-divider></mat-divider>
              <div class="service-detail-body">
                <app-services-suunto [user]="user" [hasProAccess]="hasProAccess"></app-services-suunto>
              </div>
            </section>
        </section>
      </app-workspace-section-navigation>
    </main>
  </app-loading-overlay>
</div>
