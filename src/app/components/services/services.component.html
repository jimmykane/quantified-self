<div class="settings-container">
  <app-loading-overlay [isLoading]="isLoading" [showSkeleton]="false" height="auto">
    <main class="settings-content services-content">
      <app-workspace-section-navigation
        navigationLabel="Workspace"
        navigationAriaLabel="Services workspace"
        [sections]="workspaceSectionOptions"
        activeSection="connections"
        variant="services"
        [showMobileNavigation]="false"
        (sectionSelected)="selectWorkspaceSection($event)">
        <header class="services-page-header">
          <h1>Connections</h1>
          <p>Bring your activity data together.</p>
        </header>

        <mat-button-toggle-group
          class="provider-selector provider-selector--desktop"
          [value]="activeSection"
          hideSingleSelectionIndicator
          aria-label="Service providers"
          (change)="selectService($event.value)">
          @for (section of serviceSectionOptions; track section.id) {
          <mat-button-toggle [value]="section.id" [attr.aria-label]="section.label">
            <span class="provider-selector__option">
              <app-service-source-icon
                [sourceServiceName]="section.serviceName"
                [showTooltip]="false">
              </app-service-source-icon>
              <span class="provider-selector__name">{{ section.label }}</span>
            </span>
          </mat-button-toggle>
          }
        </mat-button-toggle-group>

        <nav
          mat-tab-nav-bar
          [tabPanel]="providerPanel"
          mat-stretch-tabs="true"
          class="provider-selector provider-selector--mobile"
          aria-label="Service providers">
          @for (section of serviceSectionOptions; track section.id) {
          <a
            href=""
            mat-tab-link
            [active]="activeSection === section.id"
            (click)="$event.preventDefault(); selectService(section.id)">
            {{ section.label }}
          </a>
          }
        </nav>

        <mat-tab-nav-panel #providerPanel class="services-workspace-main">
          <section
            class="service-detail"
            [hidden]="activeSection !== 'garmin'"
            aria-label="Garmin Connect">
            <app-services-garmin
              [user]="user"
              [hasProAccess]="hasProAccess"
              [isAdmin]="isAdmin">
            </app-services-garmin>
          </section>

          <section
            class="service-detail"
            [hidden]="activeSection !== 'suunto'"
            aria-label="Suunto App">
            <app-services-suunto [user]="user" [hasProAccess]="hasProAccess"></app-services-suunto>
          </section>

          <section
            class="service-detail"
            [hidden]="activeSection !== 'coros'"
            aria-label="COROS">
            <app-services-coros [user]="user" [hasProAccess]="hasProAccess"></app-services-coros>
          </section>
        </mat-tab-nav-panel>
      </app-workspace-section-navigation>
    </main>
  </app-loading-overlay>
</div>
