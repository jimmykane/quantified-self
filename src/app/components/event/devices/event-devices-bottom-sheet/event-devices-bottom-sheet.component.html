<div class="bottom-sheet-container">
    <app-bottom-sheet-header title="Devices" icon="devices">
        <button mat-icon-button (click)="close()">
            <mat-icon>close</mat-icon>
        </button>
    </app-bottom-sheet-header>
    <div class="bottom-sheet-content qs-scrollbar">
        <app-event-card-devices [event]="data.event" [selectedActivities]="data.selectedActivities">
        </app-event-card-devices>
    </div>
</div>
