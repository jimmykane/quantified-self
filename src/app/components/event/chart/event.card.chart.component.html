<app-event-section-header icon="show_chart">
  <app-event-card-chart-actions [(xAxisType)]="xAxisType" [(showAllData)]="showAllData" [(showLaps)]="showLaps"
    [event]="event" [user]="user">
  </app-event-card-chart-actions>
</app-event-section-header>

<mat-card-content class="event-chart-content">
  <app-loading-overlay [isLoading]="isLoading" [showSkeleton]="true" height="auto">
    <section class="event-chart-shell" [class.event-chart-shell--loading]="isLoading">
      @if (dataTypeLegendItems.length > 0) {
      <section class="event-chart-shell__legend" aria-label="Data type visibility">
        <mat-chip-listbox [multiple]="true" [hideSingleSelectionIndicator]="true" class="event-chart-shell__legend-list">
          @for (item of dataTypeLegendItems; track item.dataType) {
          <mat-chip-option [selected]="item.visible"
            (selectionChange)="onDataTypeLegendSelectionChange(item.dataType, $event.selected)">
            <span class="event-chart-shell__swatch" [style.background]="item.color"></span>
            <span class="event-chart-shell__label">{{ item.label }}</span>
          </mat-chip-option>
          }
        </mat-chip-listbox>
        @if (chartPanels.length === 0) {
        <button mat-stroked-button type="button" (click)="onShowAllDataTypes()">
          Show all data types
        </button>
        }
      </section>
      }

      <section class="event-chart-shell__panels">
        @for (panel of chartPanels; track panel.dataType; let isLast = $last) {
        <app-event-card-chart-panel [panel]="panel" [xAxisType]="renderedXAxisType" [chartTheme]="chartTheme"
          [useAnimations]="useAnimations" [showZoomBar]="isLast" [zoomGroupId]="zoomSyncGroupId" [xDomain]="xDomain"
          [showLaps]="showLaps" [lapTypes]="lapTypes" [lapMarkers]="lapMarkers"
          [extraMaxForPower]="extraMaxForPower"
          [extraMaxForPace]="extraMaxForPace" (cursorPositionChange)="onPanelCursorPositionChange($event)">
        </app-event-card-chart-panel>
        }
      </section>
    </section>
  </app-loading-overlay>
</mat-card-content>
