<app-event-section-header icon="show_chart">
  <app-event-card-chart-actions [(xAxisType)]="xAxisType" [(showAllData)]="showAllData" [(showLaps)]="showLaps"
    [event]="event" [user]="user">
  </app-event-card-chart-actions>
</app-event-section-header>

<mat-card-content class="event-chart-content">
  <app-loading-overlay [isLoading]="isLoading" [showSkeleton]="true" height="auto">
    <section class="event-chart-shell" [class.event-chart-shell--loading]="isLoading">
      @if (dataTypeLegendItems.length > 0) {
      <section class="event-chart-shell__legend" aria-label="Data type visibility">
        <div class="event-chart-shell__legend-list" role="group" aria-label="Data type visibility">
          @for (item of dataTypeLegendItems; track item.dataType) {
          <button mat-button type="button" class="event-chart-shell__legend-item"
            [attr.aria-pressed]="item.visible"
            (click)="onDataTypeLegendSelectionChange(item.dataType, !item.visible)">
            <span class="event-chart-shell__swatch" [style.background]="resolveLegendDotColor(item)"></span>
            <span class="event-chart-shell__label">{{ item.label }}</span>
          </button>
          }
        </div>
        @if (chartPanels.length === 0) {
        <button mat-stroked-button type="button" (click)="onShowAllDataTypes()">
          Show all data types
        </button>
        }
      </section>
      }

      @if (chartPanels.length > 0) {
      <app-event-card-chart-panel class="event-chart-shell__zoom-bar" [xAxisType]="renderedXAxisType"
        [chartTheme]="chartTheme" [useAnimations]="false" [showZoomBar]="true" [zoomGroupId]="zoomSyncGroupId"
        [xDomain]="xDomain" [showDateOnTimeAxis]="showDateOnTimeAxis" [showLaps]="false" [lapMarkers]="[]"
        [strokeWidth]="strokeWidth">
      </app-event-card-chart-panel>
      }

      <section class="event-chart-shell__panels">
        @for (panel of chartPanels; track panel.dataType) {
        <app-event-card-chart-panel [panel]="panel" [xAxisType]="renderedXAxisType" [chartTheme]="chartTheme"
          [useAnimations]="useAnimations" [showZoomBar]="false" [zoomGroupId]="zoomSyncGroupId" [xDomain]="xDomain"
          [showDateOnTimeAxis]="showDateOnTimeAxis"
          [showLaps]="showLaps" [lapTypes]="lapTypes" [lapMarkers]="lapMarkers"
          [extraMaxForPower]="extraMaxForPower"
          [extraMaxForPace]="extraMaxForPace" [strokeWidth]="strokeWidth"
          [showActivityNamesInTooltip]="showActivityNamesInTooltip"
          (cursorPositionChange)="onPanelCursorPositionChange($event)">
        </app-event-card-chart-panel>
        }
      </section>
    </section>
  </app-loading-overlay>
</mat-card-content>
