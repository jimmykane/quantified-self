<app-event-section-header icon="show_chart">
  <app-event-card-chart-actions [xAxisType]="displayedXAxisType" [(showAllData)]="showAllData" [(showLaps)]="showLaps"
    [(showSwimLengths)]="showSwimLengths"
    [(cursorBehaviour)]="cursorBehaviour" [(syncChartHoverToMap)]="syncChartHoverToMap"
    [(colorAltitudeByGrade)]="colorAltitudeByGrade" [(fillOpacity)]="fillOpacity"
    [event]="event" [user]="user"
    [canSelectDistanceXAxis]="canSelectDistanceXAxis"
    [showSwimLengthsToggle]="hasSelectedSwimLengths"
    [showAltitudeGradeColorToggle]="hasAltitudeGradeColorData"
    [showResetChartState]="hasResettableChartState"
    [showSeriesMenu]="dataTypeLegendItems.length > 0"
    [seriesMenuSummary]="seriesMenuSummary"
    [seriesMenuItems]="dataTypeLegendItems"
    (xAxisTypeChange)="onXAxisTypeChange($event)"
    (seriesVisibilityToggle)="onDataTypeLegendSelectionChange($event.dataType, $event.visible)"
    (showAllSeries)="onShowAllDataTypes()"
    (resetChartState)="onResetChartStateRequested()">
  </app-event-card-chart-actions>
</app-event-section-header>

<mat-card-content class="event-chart-content">
  <app-loading-overlay [isLoading]="isLoading" [showSkeleton]="true" height="auto">
    <section class="event-chart-shell" [class.event-chart-shell--loading]="isLoading">
      @if (chartPanels.length > 0) {
      <app-event-card-chart-panel class="event-chart-shell__zoom-bar" [xAxisType]="renderedXAxisType"
        [darkTheme]="darkTheme" [useAnimations]="false" [showZoomBar]="true"
        [xDomain]="xDomain" [showDateOnTimeAxis]="showDateOnTimeAxis" [showLaps]="showLaps" [lapTypes]="lapTypes"
        [lapMarkers]="lapMarkers" [showSwimLengths]="showSwimLengths" [swimLengthMarkers]="swimLengthMarkers"
        [userUnitSettings]="userUnitSettings"
        [strokeWidth]="strokeWidth" [zoomBarOverviewData]="zoomBarOverviewData" [sharedZoomRange]="zoomRange"
        (zoomRangeChange)="onZoomRangeChange($event)">
      </app-event-card-chart-panel>
      }

      <section class="event-chart-shell__panels">
        @for (panelView of chartPanelViews; track panelView.panel.dataType) {
        <app-event-card-chart-panel [panel]="panelView.panel" [overlayPanel]="panelView.overlayPanel"
          [overlayOptions]="panelView.overlayOptions" [selectedOverlayDataType]="panelView.selectedOverlayDataType"
          [overlayPickerDisabled]="!user"
          [xAxisType]="renderedXAxisType" [darkTheme]="darkTheme"
          [useAnimations]="useAnimations" [showZoomBar]="false" [xDomain]="xDomain"
          [cursorBehaviour]="cursorBehaviour" [previewRange]="previewSelectedRange" [selectedRange]="selectedRange"
          [showDateOnTimeAxis]="showDateOnTimeAxis"
          [showLaps]="showLaps" [lapTypes]="lapTypes" [lapMarkers]="lapMarkers"
          [showSwimLengths]="showSwimLengths" [swimLengthMarkers]="swimLengthMarkers"
          [gainAndLossThreshold]="gainAndLossThreshold"
          [strokeWidth]="strokeWidth" [fillOpacity]="fillOpacity" [colorAltitudeByGrade]="colorAltitudeByGrade"
          [userUnitSettings]="userUnitSettings"
          [emitAxisPointerCursor]="syncChartHoverToMap"
          [waterMark]="waterMarkText"
          [sharedZoomRange]="zoomRange"
          [showActivityNamesInTooltip]="showActivityNamesInTooltip"
          (zoomRangeChange)="onZoomRangeChange($event)"
          (previewRangeChange)="onPreviewSelectedRangeChange($event)"
          (selectedRangeChange)="onSelectedRangeChange($event)"
          (overlayDataTypeChange)="onPanelOverlayDataTypeChange(panelView.panel.dataType, $event)"
          (cursorPositionChange)="onPanelCursorPositionChange($event)">
        </app-event-card-chart-panel>
        }
      </section>
    </section>
  </app-loading-overlay>
</mat-card-content>
