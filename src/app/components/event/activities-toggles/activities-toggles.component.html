<mat-chip-listbox class="activity-chips" [multiple]="true" [hideSingleSelectionIndicator]="true"
  aria-label="Activity selection">
  @for (row of activityDisplayRows(); track row.trackKey) {
  <mat-chip-option [selected]="isSelected(row.activity)"
    [disabled]="isOnlySelectedActivity(row.activity)"
    [style.--chip-accent-color]="row.color" (click)="toggleActivity(row.activity)"
    class="activity-chip">
    <div class="chip-content">
      <span class="chip-type">{{ row.primaryLabel }}</span>
      <span class="chip-stats">
        {{ row.duration }} • {{ row.distance }}
      </span>
      @if (shouldShowDeviceNames() && isOwner()) {
      <span class="chip-device-row">
        <button
          mat-icon-button
          class="chip-device-edit-button"
          aria-label="Rename device"
          matTooltip="Rename this activity device"
          (click)="$event.stopPropagation(); renameDevice(row.activity)">
          <mat-icon>edit</mat-icon>
        </button>
      </span>
      }
    </div>
  </mat-chip-option>
  }
</mat-chip-listbox>
