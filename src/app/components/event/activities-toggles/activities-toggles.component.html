<mat-chip-listbox class="activity-chips" [multiple]="true" [hideSingleSelectionIndicator]="true"
  aria-label="Activity selection">
  @for (activity of activities(); track trackByActivityId($index, activity)) {
  <mat-chip-option [selected]="isSelected(activity)"
    [disabled]="isOnlySelectedActivity(activity)"
    [style.--chip-accent-color]="getActivityColor(activity)" (click)="toggleActivity(activity)"
    class="activity-chip">
    <div class="chip-content">
      <span class="chip-type">{{ getPrimaryLabel(activity) }}</span>
      <span class="chip-stats">
        {{ activity.getDuration().getDisplayValue() }} • {{ activity.getDistance().getDisplayValue() }}{{
        activity.getDistance().getDisplayUnit() }}
      </span>
      @if (shouldShowDeviceNames() && isOwner()) {
      <span class="chip-device-row">
        <button
          mat-icon-button
          class="chip-device-edit-button"
          aria-label="Rename device"
          matTooltip="Rename this activity device"
          (click)="$event.stopPropagation(); renameDevice(activity)">
          <mat-icon>edit</mat-icon>
        </button>
      </span>
      }
    </div>
  </mat-chip-option>
  }
</mat-chip-listbox>
