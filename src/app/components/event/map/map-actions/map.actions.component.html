<section class="map-actions">
  <span [matTooltip]="user ? 'Map layers' : 'Sign in to use this'">
    <button mat-stroked-button class="layers-trigger" [matMenuTriggerFor]="layersMenu" [disabled]="!user"
      aria-label="Map layers">
      <mat-icon>layers</mat-icon>
      Layers
    </button>
  </span>
</section>

<mat-menu #layersMenu="matMenu" xPosition="before">
  <section mat-menu-item>
    <mat-slide-toggle class="map-layer-toggle" [checked]="showLaps" [disabled]="!user"
      (change)="onShowLapsToggle($event.checked)">
      Show Laps
    </mat-slide-toggle>
  </section>
  <section mat-menu-item>
    <mat-slide-toggle class="map-layer-toggle" [checked]="showArrows" [disabled]="!user"
      (change)="onShowArrowsToggle($event.checked)">
      Show Arrows
    </mat-slide-toggle>
  </section>
</mat-menu>
