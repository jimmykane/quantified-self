<div class="map-component-wrapper">
  <app-event-section-header icon="map">
    <app-map-layers-actions
      [showLaps]="showLaps"
      [showArrows]="showArrows"
      [is3D]="is3D"
      [mapStyle]="mapStyle"
      [user]="user"
      [enableLapsToggle]="true"
      [enableArrowsToggle]="true"
      [enable3DToggle]="true"
      (showLapsChange)="onShowLapsChange($event)"
      (showArrowsChange)="onShowArrowsChange($event)"
      (is3DChange)="onShow3DChange($event)"
      (mapStyleChange)="onMapStyleChange($event)">
    </app-map-layers-actions>
  </app-event-section-header>

  <app-loading-overlay
    [isLoading]="isLoading || !apiLoaded()"
    [hasError]="noMapData"
    errorMessage="No Map Data"
    [showSkeleton]="true"
    height="60vh">

    @if (event && event.getActivities().length > 1) {
    <mat-card class="map-legend mat-elevation-z0">
      @for (activity of event.getActivities(); track activity.getID()) {
      <app-activity-toggle
        [activity]="activity"
        [event]="event"
        [showToggle]="false"
        [showStats]="false"
        [showDate]="false"
        [selectedActivities]="selectedActivities">
      </app-activity-toggle>
      }
    </mat-card>
    }

    <section class="mapbox-stage">
      <div #mapDiv class="mapbox-map"></div>

      @if (openedJumpMarkerInfoWindow && jumpPopupScreenPosition(); as popupPosition) {
      <div #jumpPopupAnchor class="jump-popup-anchor" [style.left.px]="popupPosition.x" [style.top.px]="popupPosition.y">
        <app-jump-marker-popup [jump]="openedJumpMarkerInfoWindow" (dismiss)="onJumpPopupDismiss()"></app-jump-marker-popup>
      </div>
      }
    </section>
  </app-loading-overlay>
</div>
