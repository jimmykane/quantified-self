<mat-card-header>
  @if (showToggle()) {
  <div mat-card-avatar>
    <mat-slide-toggle (change)="onActivitySelect($event, activity())" [checked]="isSelected()">
    </mat-slide-toggle>
  </div>
  }

  <mat-card-title (click)="onActivityClick(activity())"
    [ngStyle]="event().isMerge && isSelected() && {color: activityColor()}">
    <span><b>{{ primaryLabel() }}</b></span>
  </mat-card-title>
  @if (showDate()) {
  <mat-card-subtitle>
    {{activity().startDate | date:'medium'}}
  </mat-card-subtitle>
  }
  @if (showStats()) {
  <mat-card-subtitle>
    <span><b>{{activity().getDuration().getDisplayValue()}}</b>, </span>
    <span><b>{{activity().getDistance().getDisplayValue()}}</b>{{activity().getDistance().getDisplayUnit()}}</span>
  </mat-card-subtitle>
  }
</mat-card-header>
