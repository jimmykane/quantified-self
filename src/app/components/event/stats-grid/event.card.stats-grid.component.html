@if (metricTabs.length > 0) {
<mat-tab-group class="summary-metric-tabs" [selectedIndex]="selectedTabIndex" [disablePagination]="true"
    (selectedIndexChange)="onSelectedTabIndexChange($event)">
    @for (tab of metricTabs; track tab.id) {
    <mat-tab [aria-label]="tab.label">
        <ng-template mat-tab-label>
            <span class="summary-tab-label">
                <mat-icon aria-hidden="true" class="summary-tab-icon">{{ getTabIcon(tab.id) }}</mat-icon>
                <span class="summary-tab-text">{{ tab.label }}</span>
            </span>
        </ng-template>
        <ng-template matTabContent>
            <app-header-stats [statsToShow]="tab.metricTypes" [layout]="layout" [stats]="stats" [unitSettings]="unitSettings"
                [showDiff]="showDiff" [diffByType]="diffByType" [singleValueTypes]="getSingleValueTypesForTab(tab)">
            </app-header-stats>
        </ng-template>
    </mat-tab>
    }
</mat-tab-group>
}
