<app-loading-overlay [isLoading]="isLoading" [hasError]="showNoDataError" [allowErrorPassthrough]="true" [errorMessage]="noDataErrorMessage"
  [errorHint]="noDataErrorHint" [errorIcon]="noDataErrorIcon" [showSkeleton]="false" height="100%" [style.height.%]="100">
  <section class="efficiency-layout">
    <header class="efficiency-header">
      <div class="title-row">
        <div class="efficiency-title">Efficiency Trend</div>
        @if (infoTooltip) {
        <button mat-icon-button class="title-info-button" [matTooltip]="infoTooltip" matTooltipPosition="below"
          aria-label="How this chart is calculated">
          <mat-icon>info</mat-icon>
        </button>
        }
      </div>
      <div class="efficiency-value">{{ latestValueText }}</div>
      <div class="efficiency-subtitle">Latest power / heart-rate ratio</div>
    </header>
    <div #chartDiv class="efficiency-chart"></div>
  </section>
</app-loading-overlay>
