<app-loading-overlay [isLoading]="isLoading" [hasError]="showNoDataError" [allowErrorPassthrough]="true" [errorMessage]="noDataErrorMessage"
  [errorHint]="noDataErrorHint" [errorIcon]="noDataErrorIcon" [showSkeleton]="false" height="100%" [style.height.%]="100">
  <section class="forecast-layout">
    <header class="forecast-header">
      <div class="title-row">
        <div class="forecast-title qs-dashboard-chart-title">Freshness Forecast</div>
        @if (infoTooltip) {
        <button mat-icon-button class="title-info-button" appHapticTap appTooltipTap [matTooltip]="infoTooltip" matTooltipPosition="below"
          aria-label="How this chart is calculated">
          <mat-icon>info</mat-icon>
        </button>
        }
      </div>
      <div class="forecast-stats">
        <div class="forecast-stat">
          <div class="forecast-stat-value">{{ currentFormText }}</div>
          <div class="forecast-stat-label">Now (TSB)</div>
        </div>
        <div class="forecast-stat">
          <div class="forecast-stat-value">{{ forecastFormText }}</div>
          <div class="forecast-stat-label">+7d (TSB)</div>
        </div>
      </div>
    </header>
    <div #chartDiv class="forecast-chart"></div>
  </section>
</app-loading-overlay>
