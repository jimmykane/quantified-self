<app-loading-overlay [isLoading]="isLoading" [hasError]="data && data.length === 0" [errorMessage]="'No data yet'"
  [errorHint]="'Needs activities with heart rate or power data'" [errorIcon]="'favorite'" [showSkeleton]="false"
  height="100%" [style.height.%]="100">
  <div #chartDiv [style.min-width.%]="100" [style.min-height.%]="100"></div>
</app-loading-overlay>
