<app-loading-overlay [isLoading]="isLoading" [hasError]="showNoDataError" [allowErrorPassthrough]="true" [errorMessage]="noDataErrorMessage"
  [errorHint]="noDataErrorHint" [errorIcon]="noDataErrorIcon" [showSkeleton]="false" height="100%" [style.height.%]="100">
  <section class="sleep-layout">
    <header class="sleep-header">
      <div class="title-row">
        <div class="sleep-title">Sleep</div>
        @if (infoTooltip) {
        <button mat-icon-button class="title-info-button" appHapticTap appTooltipTap [matTooltip]="infoTooltip" matTooltipPosition="below"
          aria-label="How this chart is calculated">
          <mat-icon>info</mat-icon>
        </button>
        }
      </div>
      <div class="sleep-stats">
        <div class="sleep-stat">
          <div class="sleep-stat-value">{{ latestDurationText }}</div>
          <div class="sleep-stat-label">Latest</div>
        </div>
        <div class="sleep-stat">
          <div class="sleep-stat-value">{{ latestScoreText }}</div>
          <div class="sleep-stat-label">Score</div>
        </div>
        <div class="sleep-stat">
          <div class="sleep-stat-value">{{ latestHrvText }}</div>
          <div class="sleep-stat-label">HRV</div>
        </div>
      </div>
      <div class="sleep-context-label">{{ latestContextText }}</div>
    </header>
    <div #chartDiv class="sleep-chart"></div>
  </section>
</app-loading-overlay>
