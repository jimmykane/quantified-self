<app-loading-overlay [isLoading]="isLoading" [hasError]="!isLoading && !hasData()" [allowErrorPassthrough]="true" [errorMessage]="'No data yet'"
  [errorHint]="'Needs events with a Training Stress Score'" [errorIcon]="'monitoring'" [showSkeleton]="false"
  height="100%" [style.height.%]="100">
  <section class="form-chart-layout">
    <header class="form-chart-header">
      <div class="form-status-row">
        <h3 class="form-status-title" [attr.data-status]="status().key">{{ status().title }}</h3>
        <div class="form-status-meta">Latest TSS: {{ headlineStats().tss.value }}</div>
      </div>

      <div class="form-stats-row">
        <div class="form-stat">
          <div class="form-stat-value">{{ headlineStats().fitness.value }}</div>
          <div class="form-stat-label">Fitness (CTL)</div>
        </div>
        <div class="form-stat">
          <div class="form-stat-value">{{ headlineStats().fatigue.value }}</div>
          <div class="form-stat-label">Fatigue (ATL)</div>
        </div>
        <div class="form-stat">
          <div class="form-stat-value">{{ headlineStats().form.value }}</div>
          <div class="form-stat-label">Form (TSB)</div>
        </div>
      </div>
    </header>

    <div #chartDiv class="form-chart-surface"></div>
  </section>
</app-loading-overlay>
