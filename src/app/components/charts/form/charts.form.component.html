<app-loading-overlay [isLoading]="isLoading" [hasError]="!isLoading && !hasData()" [allowErrorPassthrough]="true" [errorMessage]="noDataErrorMessage"
  [errorHint]="noDataErrorHint" [errorIcon]="noDataErrorIcon" [showSkeleton]="false"
  height="100%" [style.height.%]="100">
  <section class="form-chart-layout">
    <header class="form-chart-header" [class.form-chart-header-reserve-actions]="reserveTitleActionSpace">
      <div class="form-status-row">
        <div class="form-status-title-row">
          <h3 class="form-status-title qs-dashboard-chart-title" [attr.data-status]="status().key">{{ status().title }}</h3>
          @if (infoTooltip) {
          <button mat-icon-button class="title-info-button" appHapticTap appTooltipTap [matTooltip]="infoTooltip" matTooltipPosition="below"
            aria-label="How this chart is calculated">
            <mat-icon>info</mat-icon>
          </button>
          }
        </div>
      </div>

      <div class="form-stats-row">
        <div class="form-stat">
          <div class="form-stat-value">{{ headlineStats().fitness.value }}</div>
          <div class="form-stat-label">Fitness (CTL)</div>
        </div>
        <div class="form-stat">
          <div class="form-stat-value">{{ headlineStats().fatigue.value }}</div>
          <div class="form-stat-label">Fatigue (ATL)</div>
        </div>
        <div class="form-stat">
          <div class="form-stat-value">{{ headlineStats().form.value }}</div>
          <div class="form-stat-label">Form (TSB)</div>
        </div>
        <div class="form-stat">
          <div class="form-stat-value">{{ headlineStats().tss.value }}</div>
          <div class="form-stat-label">Latest TSS</div>
        </div>
      </div>
    </header>

    <div #chartDiv class="form-chart-surface"></div>
  </section>
</app-loading-overlay>
