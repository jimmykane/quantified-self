<app-loading-overlay [isLoading]="isLoading" [hasError]="showNoDataError" [allowErrorPassthrough]="true"
  [errorMessage]="noDataErrorMessage" [errorHint]="noDataErrorHint" [errorIcon]="noDataErrorIcon"
  [showSkeleton]="false" height="100%" [style.height.%]="100">
  <section class="power-curve-layout">
    <header class="power-curve-header" [class.power-curve-header-reserve-actions]="reserveTitleActionSpace">
      <div class="title-row">
        <div class="power-curve-title-group">
          <div class="power-curve-title qs-dashboard-chart-title">{{ title }}</div>
          @if (infoTooltip) {
          <button mat-icon-button class="title-info-button" appHapticTap appTooltipTap [matTooltip]="infoTooltip"
            matTooltipPosition="below" aria-label="How this chart is calculated">
            <mat-icon>info</mat-icon>
          </button>
          }
        </div>
      </div>
      @if (benchmarkChips.length) {
      <mat-chip-set class="power-curve-benchmarks" aria-label="Power curve benchmark powers">
        @for (chip of benchmarkChips; track chip.duration) {
        <mat-chip class="power-curve-benchmark-chip"
          [class.power-curve-benchmark-chip-primary]="chip.primary"
          [highlighted]="chip.primary" [color]="chip.primary ? 'primary' : null" disableRipple>
          <span class="power-curve-benchmark-label">{{ chip.durationLabel }}</span>
          <span class="power-curve-benchmark-value">{{ chip.powerLabel }}</span>
        </mat-chip>
        }
      </mat-chip-set>
      } @else {
      <div class="power-curve-benchmarks-empty">--</div>
      }
      <div class="power-curve-subtitle">{{ subtitleText }}</div>
    </header>
    <div #chartDiv class="power-curve-chart"></div>
  </section>
</app-loading-overlay>
