<app-loading-overlay [isLoading]="isLoading" [hasError]="showNoDataError" [allowErrorPassthrough]="true" [errorMessage]="noDataErrorMessage"
  [errorHint]="noDataErrorHint" [errorIcon]="noDataErrorIcon" [showSkeleton]="false" height="100%" [style.height.%]="100">
  <section class="kpi-layout" [class.kpi-layout-dark]="darkTheme" (click)="onKpiLayoutClick($event)">
    <header class="kpi-header" [class.kpi-header-reserve-actions]="reserveTitleActionSpace">
      <div class="title-row">
        <div class="kpi-title" [attr.title]="title">{{ titleDisplay }}</div>
        @if (infoTooltip) {
        <button mat-icon-button class="title-info-button" [matTooltip]="infoTooltip" matTooltipPosition="below"
          aria-label="How this KPI is calculated" (click)="onInfoButtonClick($event)">
          <mat-icon>info</mat-icon>
        </button>
        }
      </div>
      <div class="kpi-value">{{ primaryValueText }}</div>
      <div class="kpi-primary-label">{{ primaryLabel }}</div>
      <div class="kpi-secondary-label">{{ secondaryLabel }}</div>
      @if (secondaryValueText) {
      <div class="kpi-secondary-value">{{ secondaryValueText }}</div>
      }
    </header>
    <div #chartDiv class="kpi-sparkline"></div>
  </section>
</app-loading-overlay>
